version: "3.9"

services:

  # =========================
  # Redis（持久化）
  # =========================
  redis:
    image: redis:7
    container_name: whisper-redis
    restart: unless-stopped
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes


  # =========================
  # API
  # =========================
  api:
    build: .
    container_name: whisper-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000

    networks:
      - default
      - proxy_network


  # =========================
  # Worker（GPU）
  # =========================
  worker:
    build: .
    container_name: whisper-worker-gpu7
    restart: unless-stopped

    runtime: nvidia

    environment:
      - NVIDIA_VISIBLE_DEVICES=7
      - CUDA_VISIBLE_DEVICES=0
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}

    depends_on:
      - redis

    command: celery -A worker.celery worker --loglevel=info --concurrency=1

    networks:
      - default
  
networks:
  proxy_network:
    external: true
